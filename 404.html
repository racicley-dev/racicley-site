<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>404 - Página Não Encontrada | Racicley</title>
    <style>
        /* Estilos específicos para centralizar o conteúdo da 404 */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.2;
        }

        .error-content h2 {
            border: none;
            padding: 0;
            margin-bottom: 1rem;
        }

        .btn-back {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <button id="lang-toggle" class="lang-btn" onclick="toggleLanguage()">
        <span class="flag-icon">🇺🇸</span>
        <span id="btn-text">English</span>
    </button>

    <main class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h2 data-translate="404_title">Ops! Página não encontrada</h2>
            <p data-translate="404_desc">Parece que o link que você tentou acessar não existe ou foi movido.</p>
            <a href="/" class="btn-back">
                <i class="bi bi-house-door"></i> <span data-translate="404_btn">Voltar ao Início</span>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Racicley Costa. <span data-translate="footer_rights">Todos os direitos reservados.</span></p>
    </footer>

    <script src="utils.js"></script>
    <script>
        // Adicionando as chaves de tradução específicas da 404 dinamicamente
        // para não precisar editar o seu arquivo utils.js original
        Object.assign(translations.pt, {
            '404_title': 'Ops! Página não encontrada',
            '404_desc': 'Parece que o link que você tentou acessar não existe ou foi movido.',
            '404_btn': 'Voltar ao Início'
        });

        Object.assign(translations.en, {
            '404_title': 'Oops! Page not found',
            '404_desc': 'It looks like the link you tried to access does not exist or has been moved.',
            '404_btn': 'Back to Home'
        });
    </script>
</body>

</html>
